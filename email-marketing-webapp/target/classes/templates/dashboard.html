<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Dashboard')}"></head>
<body>

<div class="app-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/navbar :: navbar('Dashboard')}"></div>

        <div class="container-fluid px-4">

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card stat-card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center">
                            <div class="stat-icon bg-primary-subtle text-primary me-3">
                                <i class="bi bi-check-circle-fill fs-3"></i>
                            </div>
                            <div>
                                <h6 class="text-muted mb-1">Email Terkirim</h6>
                                <h3 class="fw-bold mb-0" th:text="${totalTerkirim}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center">
                            <div class="stat-icon bg-danger-subtle text-danger me-3">
                                <i class="bi bi-x-circle-fill fs-3"></i>
                            </div>
                            <div>
                                <h6 class="text-muted mb-1">Gagal Terkirim</h6>
                                <h3 class="fw-bold mb-0" th:text="${totalGagal}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card border-0 shadow-sm h-100">
                        <div class="card-body d-flex align-items-center">
                            <div class="stat-icon bg-info-subtle text-info me-3">
                                <i class="bi bi-people-fill fs-3"></i>
                            </div>
                            <div>
                                <h6 class="text-muted mb-1">Jumlah Penerima</h6>
                                <h3 class="fw-bold mb-0" th:text="${totalPenerima}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm text-center p-4">
                        <i class="bi bi-send-fill text-primary mb-3" style="font-size: 2.5rem;"></i>
                        <h5 class="fw-semibold">Siap Mengirim Campaign?</h5>
                        <p class="text-muted small">Pastikan SMTP, template, dan daftar penerima sudah siap.</p>
                        <a th:href="@{/kirim-email}" class="btn btn-primary">
                            <i class="bi bi-send-fill me-1"></i> Tombol Kirim Email
                        </a>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header bg-white fw-semibold">
                            <i class="bi bi-clock-history me-1"></i> Aktivitas Terbaru
                        </div>
                        <div class="card-body p-0">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Tanggal</th>
                                        <th>Email Tujuan</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${#lists.isEmpty(recentHistory)}">
                                        <td colspan="3" class="text-center text-muted py-4">Belum ada riwayat pengiriman.</td>
                                    </tr>
                                    <tr th:each="h : ${recentHistory}">
                                        <td th:text="${h.tanggalFormatted}">-</td>
                                        <td th:text="${h.emailTujuan}">-</td>
                                        <td>
                                            <span class="badge" th:classappend="${h.status == 'SUKSES'} ? 'bg-success' : 'bg-danger'" th:text="${h.status}">-</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
