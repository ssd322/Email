# =========================================================
# Konfigurasi Aplikasi - Email Marketing Web (Spring Boot)
# =========================================================

server.port=8080
spring.application.name=email-marketing-webapp

# ---------------------------------------------------------
# Login Admin (username & password diambil dari sini)
# ---------------------------------------------------------
admin.username=admin
admin.password=admin123

# ---------------------------------------------------------
# Konfigurasi SMTP default (bisa diubah dari halaman SMTP saat runtime)
# ---------------------------------------------------------
smtp.host=smtp.gmail.com
smtp.port=587
smtp.username=youremail@gmail.com
smtp.password=your-app-password
smtp.tls=true

# ---------------------------------------------------------
# Pengaturan pengiriman email
# ---------------------------------------------------------
mail.send.delay-ms=1000

# ---------------------------------------------------------
# Upload file (CSV)
# ---------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------------------------------------------------------
# Thymeleaf
# ---------------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ---------------------------------------------------------
# Session
# ---------------------------------------------------------
server.servlet.session.timeout=30m

# ---------------------------------------------------------
# Logging
# ---------------------------------------------------------
logging.level.com.emailmarketing=INFO
