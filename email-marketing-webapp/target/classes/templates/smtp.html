<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('SMTP')}"></head>
<body>

<div class="app-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar('smtp')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/navbar :: navbar('Pengaturan SMTP')}"></div>

        <div class="container-fluid px-4">

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-1"></i> <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-1"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-gear-fill me-1"></i> Konfigurasi SMTP
                </div>
                <div class="card-body">
                    <form th:action="@{/smtp/save}" th:object="${smtpConfig}" method="post" class="needs-validation" novalidate>
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label">SMTP Host</label>
                                <input type="text" th:field="*{host}" class="form-control" placeholder="smtp.gmail.com" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('host')}" th:errors="*{host}"></div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">SMTP Port</label>
                                <input type="number" th:field="*{port}" class="form-control" placeholder="587" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('port')}" th:errors="*{port}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Username</label>
                                <input type="text" th:field="*{username}" class="form-control" placeholder="email@domain.com" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Password</label>
                                <input type="password" th:field="*{password}" class="form-control" placeholder="App Password" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            </div>
                            <div class="col-12">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" th:field="*{tls}" role="switch" id="tlsSwitch">
                                    <label class="form-check-label" for="tlsSwitch">Gunakan TLS (STARTTLS)</label>
                                </div>
                            </div>
                        </div>

                        <hr>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save-fill me-1"></i> Simpan
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
